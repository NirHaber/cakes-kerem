{% extends "base.html" %}

{% block content %}
<style>
    .image-picker-grid {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 18px;
        margin-top: 24px;
    }
    
    .image-picker-card {
        aspect-ratio: 1 / 1;
        overflow: hidden;
        border-radius: 18px;
        background: white;
        text-decoration: none;
        color: #3f2a1d;
        position: relative;
        box-shadow: 0 8px 20px rgba(124, 45, 18, 0.14);
    }
    
    .image-picker-card img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
    }
    
    .image-picker-card span {
        position: absolute;
        bottom: 0;
        right: 0;
        left: 0;
        background: rgba(255, 247, 237, 0.9);
        padding: 8px;
        font-size: 13px;
        text-align: center;
    }
    
    @media (max-width: 900px) {
        .image-picker-grid {
            grid-template-columns: repeat(3, 1fr);
        }
    }
    
    @media (max-width: 520px) {
        .image-picker-grid {
            grid-template-columns: repeat(2, 1fr);
        }
    }
</style>

<section class="hero">
    <div class="hero-text">
        <span class="hero-badge">בחירת תמונה</span>
        <h2>בחר תמונה למתכון</h2>
        <p>לחיצה על תמונה תחזיר אותך למסך הניהול עם התמונה שנבחרה.</p>

        <a class="back-link" href="/admin">
            חזרה לניהול ללא בחירה
        </a>
    </div>
</section>

<section class="image-picker-grid">
    {% for image in recipe_images %}
    <a class="image-picker-card" href="/admin?selected_image={{ image }}">
        <img src="{{ image }}" alt="תמונה למתכון">
        <span>{{ image.split('/')[-1] }}</span>
    </a>
    {% endfor %}
</section>

<div class="picker-actions">
    <a class="image-picker-btn" href="{{ return_to }}">
        חזרה ללא בחירת תמונה
    </a>
</div>

{% endblock %}
