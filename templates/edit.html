{% extends "base.html" %}

{% block content %}
<section class="hero">
    <div class="hero-text">
        <span class="hero-badge">עריכת מתכון</span>
        <h2>עריכת מתכון קיים</h2>
        <p>עדכן את פרטי המתכון ושמור את השינויים.</p>
    </div>
</section>

<form id="editRecipeForm" class="admin-form" method="post" action="/edit/{{ recipe.id }}" enctype="multipart/form-data">
    <input name="title" value="{{ recipe.title }}" placeholder="שם המתכון" required>

    <input name="category" value="{{ recipe.category }}" placeholder="קטגוריה" required>

    <textarea name="description" placeholder="תיאור קצר" required>{{ recipe.description }}</textarea>

    <textarea name="ingredients" placeholder="מרכיבים">{{ recipe.ingredients }}</textarea>

    <textarea name="instructions" placeholder="שלבי הכנה">{{ recipe.instructions }}</textarea>

    <div id="image-section"></div>

    <label>תמונה למתכון</label>

    <input name="image_url" value="{{ selected_image or recipe.image_url or '' }}"
        placeholder="קישור לתמונה חיצונית או תמונה שנבחרה">

    <label class="upload-image-btn">
        בחר קובץ מהמחשב
        <input type="file" name="image_file" accept="image/*">
    </label>

    <span id="selectedFileName" class="selected-file-name"></span>

    <div id="uploadedImagePreviewBox" class="selected-image-preview" style="display: none;">
        <p>התמונה שנבחרה מהמחשב:</p>
        <img id="uploadedImagePreview" src="" alt="תמונה שנבחרה מהמחשב">
    </div>

    <a href="/image-picker?return_to=/edit/{{ recipe.id }}" class="image-picker-btn"
        onclick="openImagePicker(event, 'editRecipeForm')">
        בחר תמונה מהגלריה
    </a>

    <div id="pickerImagePreviewBox" style="
        width: 260px;
        max-width: 260px;
        background: #fffaf5;
        border: 1px solid #fed7aa;
        border-radius: 18px;
        padding: 12px;
        margin: 12px 0 18px;
    ">
        <p style="margin-top: 0;">התמונה הנוכחית:</p>

        <img id="currentRecipeImage"
            src="{{ selected_image or recipe.image_url or 'https://images.unsplash.com/photo-1551024506-0bccd828d307' }}"
            alt="{{ recipe.title }}" style="
                width: 100%;
                height: 170px;
                object-fit: cover;
                border-radius: 14px;
                display: block;
            ">
    </div>

    <input name="rating" type="number" step="0.1" min="1" max="5" value="{{ recipe.rating }}" placeholder="דירוג 1-5"
        required>

    <input name="difficulty" value="{{ recipe.difficulty }}" placeholder="רמת קושי" required>

    <input name="cost" value="{{ recipe.cost }}" placeholder="עלות" required>

    <input name="prep_time" value="{{ recipe.prep_time }}" placeholder="זמן הכנה" required>

    <input name="tags" value="{{ recipe.tags }}" placeholder="תגיות מופרדות בפסיקים">

    <input name="created_by" placeholder="שם היוצר / המעדכן" value="{{ recipe.created_by or 'Nir' }}">

    <button type="submit">
        שמור שינויים
    </button>
</form>

<a class="back-link" href="/admin">
    חזרה לניהול
</a>

<script>
    function saveRecipeForm(formId) {
        const form = document.getElementById(formId);
        const data = {};

        form.querySelectorAll("input, textarea, select").forEach((field) => {
            if (field.name && field.type !== "file") {
                data[field.name] = field.value;
            }
        });

        sessionStorage.setItem(formId, JSON.stringify(data));
    }

    function restoreRecipeForm(formId) {
        const saved = sessionStorage.getItem(formId);

        if (!saved) {
            return;
        }

        const data = JSON.parse(saved);
        const form = document.getElementById(formId);

        Object.keys(data).forEach((name) => {
            const field = form.querySelector(`[name="${name}"]`);

            if (field && field.type !== "file") {
                field.value = data[name];
            }
        });
    }

    function openImagePicker(event, formId) {
        event.preventDefault();

        saveRecipeForm(formId);

        const link = event.currentTarget;
        const imageField = document.querySelector('[name="image_url"]');
        const currentImage = imageField ? imageField.value : "";

        let url = link.getAttribute("href");

        if (currentImage) {
            url += `&current_image=${encodeURIComponent(currentImage)}`;
        }

        window.location.href = url;
    }

    document.addEventListener("DOMContentLoaded", () => {
        const selectedImage = "{{ selected_image or '' }}";
        const pickerCancel = "{{ picker_cancel or '' }}";

        const imageFileField = document.querySelector('[name="image_file"]');
        const imageUrlField = document.querySelector('[name="image_url"]');

        if (imageFileField && imageUrlField) {
            imageFileField.addEventListener("change", () => {
                if (imageFileField.files.length > 0) {
                    const file = imageFileField.files[0];

                    imageUrlField.value = `static/images/recipes/${file.name}`;

                    const selectedFileName = document.getElementById("selectedFileName");
                    if (selectedFileName) {
                        selectedFileName.textContent = file.name;
                    }

                    const pickerPreviewBox = document.getElementById("pickerImagePreviewBox");
                    if (pickerPreviewBox) {
                        pickerPreviewBox.style.display = "none";
                    }

                    const previewBox = document.getElementById("uploadedImagePreviewBox");
                    const previewImage = document.getElementById("uploadedImagePreview");

                    if (previewBox && previewImage) {
                        previewImage.src = URL.createObjectURL(file);
                        previewBox.style.display = "block";
                    }
                }
            });
        }

        if (selectedImage || pickerCancel) {
            restoreRecipeForm("editRecipeForm");

            if (selectedImage) {
                const imageField = document.querySelector('[name="image_url"]');

                if (imageField) {
                    imageField.value = selectedImage;
                }

                const previewImage = document.getElementById("currentRecipeImage");

                if (previewImage) {
                    previewImage.src = selectedImage;
                }
            }
        } else {
            sessionStorage.removeItem("editRecipeForm");
        }

        if (selectedImage || pickerCancel) {
            const imageSection = document.getElementById("image-section");
            if (imageSection) {
                imageSection.scrollIntoView({
                    behavior: "smooth",
                    block: "start"
                });
            }
        }
    });
</script>

{% endblock %}
